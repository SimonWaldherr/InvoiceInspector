description:
  de:
    genericName: Rechnungsbetrachter
    shortDescription: >-
      Web-basierter Viewer/Inspector für elektronische Rechnungen (XRechnung,
      ZUGFeRD, EN 16931).
    longDescription: >
      InvoiceInspector ist eine browserbasierte Anwendung zum Visualisieren,
      Validieren und Debuggen elektronischer Rechnungen. Die Software
      unterstützt gängige Formate wie XRechnung, ZUGFeRD und EN 16931 und
      richtet sich an Entwickler, Buchhalter und Prüfer, die die strukturierten
      Daten hinter Rechnungsdokumenten detailliert untersuchen müssen.
      InvoiceInspector extrahiert und präsentiert zentrale Rechnungsmetadaten
      (Lieferant- und Empfängerkennungen, Rechnungsnummer und -datum,
      Positionen, Nettobeträge, Steuern und Summen), zeigt eingebettetes XML
      oder Anhänge (z. B. PDF/A-3) an und markiert Schemaverletzungen sowie
      businessbezogene Warnungen. Interaktive Funktionen umfassen feldgenaue
      Navigation, Suche und Filter, Kopierfunktionen für Identifikatoren, Export
      der geparsten Metadaten als JSON sowie eine erweiterbare
      Validierungspipeline für projektspezifische Regeln. InvoiceInspector läuft
      standardmäßig vollständig im Browser ohne Upload der Dokumente, um
      Datenschutz zu gewährleisten, kann aber bei Bedarf in CI-Prozesse oder
      automatisierte Prüfungen integriert werden.
    features:
      - Visualisierung von ZUGFeRD/Factur-X PDF und XRechnung XML
      - 100% clientseitige Verarbeitung ohne Upload
      - Export als XML, PDF, JSON und CSV
      - Mehrsprachig (DE, EN, FR, IT)
      - Dark-Mode-Unterstützung
      - Lokale Rechnungssammlung mit IndexedDB
      - EPC-QR-Code-Generierung für SEPA-Überweisungen
  en:
    genericName: Invoice viewer
    shortDescription: >-
      Web-based viewer/inspector for electronic invoices (XRechnung, ZUGFeRD, EN
      16931).
    longDescription: >
      InvoiceInspector is a browser-based application for visualizing,
      validating and debugging electronic invoices. It supports common European
      e-invoice standards such as XRechnung, ZUGFeRD and EN 16931 and is aimed
      at developers, billing specialists and auditors who need to inspect the
      structured data behind invoice documents. The viewer extracts and presents
      core invoice metadata (supplier and buyer identifiers, invoice number and
      date, line items, totals and tax breakdowns), shows raw embedded XML or
      attached PDF/A-3 files when present, and highlights schema validation
      failures and business-rule warnings. Interactive features include
      field-level navigation, search and filters, copy-to-clipboard for
      identifiers, export of parsed metadata to JSON, and an extendable
      validation pipeline for custom rules. By default the tool runs entirely in
      the browser without uploading documents, preserving data privacy; it can
      also be integrated into CI/CD pipelines or automated validation workflows
      via lightweight interfaces.
    features:
      - Visualise ZUGFeRD/Factur-X PDF and XRechnung XML invoices
      - 100% client-side processing, no upload required
      - Export as XML, PDF, JSON and CSV
      - Multilingual interface (DE, EN, FR, IT)
      - Dark mode support
      - Local invoice collection using IndexedDB
      - EPC QR code generation for SEPA payments
  fr:
    genericName: Visionneuse de factures
    shortDescription: >-
      Visionneuse/inspecteur web pour factures électroniques (XRechnung,
      ZUGFeRD, EN 16931).
    longDescription: >
      InvoiceInspector est une application accessible depuis le navigateur pour
      visualiser, valider et déboguer les factures électroniques. Elle prend en
      charge des standards européens tels que XRechnung, ZUGFeRD et EN 16931 et
      s'adresse aux équipes techniques, aux services de facturation et aux
      auditeurs souhaitant examiner les données structurées des documents.
      L'outil extrait et affiche les métadonnées essentielles (identifiants
      émetteur/destinataire, numéro et date de facture, lignes, totaux et
      ventilation des taxes), affiche le XML embarqué ou les pièces jointes (par
      exemple PDF/A-3) et met en exergue les écarts de schéma ainsi que les
      avertissements métier. Les fonctions interactives comprennent la
      navigation par champ, la recherche et les filtres, l'export des données
      parsées en JSON, et une pipeline de validation extensible pour des règles
      spécifiques au projet. Par défaut, InvoiceInspector s'exécute côté client
      pour préserver la confidentialité des données.
    features:
      - Visualisation de PDF ZUGFeRD/Factur-X et XML XRechnung
      - Traitement 100% côté client, sans upload
      - Export XML, PDF, JSON et CSV
      - Interface multilingue (DE, EN, FR, IT)
      - Mode sombre
      - Collection de factures locale via IndexedDB
      - Génération de QR codes EPC pour paiements SEPA
  it:
    genericName: Visualizzatore fatture
    shortDescription: >-
      Viewer/inspector web per fatture elettroniche (XRechnung, ZUGFeRD, EN
      16931).
    longDescription: >
      InvoiceInspector è un'applicazione accessibile via browser per
      visualizzare, validare e analizzare fatture elettroniche. Supporta
      standard come XRechnung, ZUGFeRD e EN 16931 e si rivolge a sviluppatori,
      addetti alla fatturazione e revisori che devono ispezionare i dati
      strutturati presenti nei documenti. Il viewer estrae e presenta i metadati
      principali (identificativi di fornitore/cliente, numero e data fattura,
      righe, totali e dettagli IVA), mostra XML incorporato o allegati PDF/A-3
      quando disponibili e evidenzia errori di validazione e avvisi di regole
      aziendali. Le funzionalità interattive includono navigazione per campo,
      ricerca e filtri, copia degli identificativi, esportazione dei metadati in
      JSON e una pipeline di validazione estendibile per regole personalizzate.
      Per impostazione predefinita l'applicazione opera nel browser senza
      caricare i documenti, riducendo i rischi per la privacy.
    features:
      - Visualizzazione di PDF ZUGFeRD/Factur-X e XML XRechnung
      - Elaborazione 100% lato client senza upload
      - Esportazione in XML, PDF, JSON e CSV
      - Interfaccia multilingue (DE, EN, FR, IT)
      - Supporto modalità scura
      - Raccolta locale di fatture con IndexedDB
      - Generazione QR code EPC per pagamenti SEPA
